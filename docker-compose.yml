services:

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: always
    environment:
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: live        # or 'paper' for paper trading
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-changeme}

      AUTO_RESTART_TIME: "11:59 PM"
      TIME_ZONE: Asia/Shanghai
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      BYPASS_WARNING: "yes"
      SAVE_TWS_SETTINGS: "1 00:00"

      TWOFA_TIMEOUT_ACTION: restart   # auto-restart on 2FA timeout
    ports:
      - "4001:4001"   # IB Gateway API port
      - "5900:5900"   # VNC (for manual login if needed)
      - "8100:8000"   # ib-viewer web UI (shared network)
    volumes:
      - ib-gateway-data:/home/ibgateway

  ib-viewer:
    build: .
    restart: always
    network_mode: "service:ib-gateway"   # share ib-gateway network, connect via 127.0.0.1
    volumes:
      - ./data:/app/backend/data
    environment:
      - IB_HOST=127.0.0.1
      - IB_PORT=4001
      - IB_CLIENT_ID=1
      - DB_PATH=/app/backend/data/ib_viewer.db
      - IB_ACCOUNT_ID=${IB_ACCOUNT_ID}
    depends_on:
      - ib-gateway

  watchdog:
    image: docker:cli
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "docker events --filter 'container=ib_viewer-ib-gateway-1' --filter 'event=start' | while read line; do echo \"[\$(date)] ib-gateway restarted, restarting ib-viewer...\"; docker restart ib_viewer-ib-viewer-1; echo \"[\$(date)] ib-viewer restart completed\"; sleep 5; done"
    depends_on:
      - ib-gateway

volumes:
  ib-gateway-data:
